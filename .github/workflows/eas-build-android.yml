name: EAS Build Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: EverworkApp/package-lock.json

      - name: Install dependencies
        run: |
          cd EverworkApp
          npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Prebuild Expo project
        run: |
          cd EverworkApp
          npx expo prebuild --platform android

      - name: Build Android (Local Gradle)
        run: |
          cd EverworkApp/android
          ./gradlew assembleRelease --no-daemon
        timeout-minutes: 45

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: everwork-android
          path: EverworkApp/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
