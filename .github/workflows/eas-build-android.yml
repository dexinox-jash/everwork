name: EAS Build Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: EverworkApp/package-lock.json

      - name: Install dependencies
        run: |
          cd EverworkApp
          npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Configure EAS Build (Local Build)
        run: |
          cd EverworkApp
          # Create a local build without needing Expo account
          eas build --platform android --profile preview --local --non-interactive --output build.apk || \
          (echo "Local build failed, attempting with npx" && \
           npx eas-cli build --platform android --profile preview --local --non-interactive --output build.apk)
        timeout-minutes: 45
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: everwork-android
          path: EverworkApp/build.apk
          retention-days: 30
