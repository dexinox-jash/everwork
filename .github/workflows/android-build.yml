name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./EverworkApp
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: EverworkApp/package-lock.json

    - name: Install dependencies
      run: npm install

    - name: Make Gradlew executable
      run: chmod +x android/gradlew

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Generate codegen files
      run: |
        cd android
        ./gradlew generateCodegenArtifactsFromSchema --no-daemon || ./gradlew generateCodegen --no-daemon || true
      env:
        NODE_OPTIONS: --max-old-space-size=4096

    - name: Clean build
      run: |
        cd android
        ./gradlew clean --no-daemon
        cd ..

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon --stacktrace
      timeout-minutes: 30
      env:
        NODE_OPTIONS: --max-old-space-size=4096

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release
        path: EverworkApp/android/app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Upload to GitHub Releases (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: EverworkApp/android/app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
