name: iOS Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods
        cd ios
        pod install

    - name: Cache Pods
      uses: actions/cache@v4
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Build iOS App
      run: |
        cd ios
        xcodebuild -workspace EverworkApp.xcworkspace \
          -scheme EverworkApp \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO

    - name: Create IPA
      run: |
        cd ios
        mkdir -p build/Payload
        cp -r build/Release-iphoneos/EverworkApp.app build/Payload/
        cd build
        zip -r EverworkApp.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-release
        path: ios/build/EverworkApp.ipa
        retention-days: 30

    - name: Upload to GitHub Releases (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ios/build/EverworkApp.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
