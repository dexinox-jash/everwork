name: iOS Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ./EverworkApp
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: EverworkApp/package-lock.json

    - name: Install dependencies
      run: npm install

    - name: Cache Pods
      uses: actions/cache@v4
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('EverworkApp/ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods -v 1.15.2
        pod --version

    - name: Pod Install
      run: |
        cd ios
        pod deintegrate || true
        pod install --repo-update
      timeout-minutes: 30
      env:
        NO_FLIPPER: 1

    - name: Build iOS
      run: |
        cd ios
        xcodebuild -workspace EverworkApp.xcworkspace \
          -scheme EverworkApp \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          | xcbeautify || true
      timeout-minutes: 30

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ios-build-artifacts
        path: |
          EverworkApp/ios/build/
        retention-days: 7
