name: iOS Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-13
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Cache Pods
      uses: actions/cache@v3
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods -v 1.12.1
        pod --version

    - name: Pod Install
      run: |
        cd ios
        pod install --repo-update --verbose
      timeout-minutes: 30

    - name: Build iOS
      run: |
        cd ios
        xcodebuild -workspace EverworkApp.xcworkspace \
          -scheme EverworkApp \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          clean build \
          CODE_SIGNING_ALLOWED=NO
      timeout-minutes: 30

    - name: Create IPA
      run: |
        cd ios
        mkdir -p build/Payload
        cp -r build/Release-iphoneos/EverworkApp.app build/Payload/ || true
        cd build
        zip -r EverworkApp.ipa Payload || echo "IPA creation skipped"

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ios-build-artifacts
        path: |
          ios/build/
          ios/*.xcarchive
        retention-days: 7
