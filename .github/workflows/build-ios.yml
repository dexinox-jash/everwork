name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ./EverworkApp
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EverworkApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Expo Prebuild
        run: |
          echo "Running expo prebuild..."
          npx expo prebuild --platform ios --clean
          echo "Prebuild complete. Listing directory:"
          ls -la
          echo "Checking ios directory:"
          ls -la ios/ || echo "No ios directory found!"

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --verbose

      - name: Build iOS App
        run: |
          echo "Building iOS for simulator (no code signing required)..."
          cd ios
          xcodebuild -workspace Everwork.xcworkspace -scheme Everwork -configuration Release -sdk iphonesimulator -derivedDataPath ../build CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          echo "Build complete. Listing build directory:"
          ls -la ../build/Build/Products/ || echo "No build products found!"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphonesimulator/Everwork.app Payload/ || echo "App not found at expected path"
          ls -la Payload/ || echo "Payload directory empty!"
          zip -r build.ipa Payload || echo "Failed to create IPA"
          ls -la build.ipa || echo "IPA not created"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: everwork-ios
          path: EverworkApp/build.ipa
          retention-days: 30
