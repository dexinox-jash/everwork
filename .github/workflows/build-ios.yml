name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ./EverworkApp
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EverworkApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Build iOS (Local)
        run: |
          # Use npx expo prebuild to generate native code
          npx expo prebuild --platform ios --clean
          
          # Install pods
          cd ios
          pod install
          
          # Build archive (requires signing setup for physical devices)
          # For simulator build (no signing required):
          xcodebuild -workspace Everwork.xcworkspace -scheme Everwork -configuration Release -sdk iphonesimulator -derivedDataPath build
          
          # Package as IPA (simplified - actual IPA requires proper signing)
          cd build/Build/Products/Release-iphonesimulator
          mkdir -p Payload
          cp -r Everwork.app Payload/
          zip -r ../../../build.ipa Payload
          cd ../../..
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: everwork-ios
          path: EverworkApp/build.ipa
          retention-days: 30
