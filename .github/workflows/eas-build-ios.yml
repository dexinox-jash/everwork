name: EAS Build iOS

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: EverworkApp/package-lock.json

      - name: Install dependencies
        run: |
          cd EverworkApp
          npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Prebuild Expo project
        run: |
          cd EverworkApp
          npx expo prebuild --platform ios

      - name: Pod Install
        run: |
          cd EverworkApp/ios
          pod install --repo-update
        env:
          NO_FLIPPER: 1

      - name: Build iOS
        run: |
          cd EverworkApp/ios
          xcodebuild -workspace EverworkApp.xcworkspace \
            -scheme EverworkApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
        timeout-minutes: 45

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: everwork-ios
          path: EverworkApp/ios/build/
          retention-days: 30
