name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./EverworkApp
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EverworkApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo Prebuild
        run: |
          echo "Installing Expo CLI..."
          npm install -g @expo/cli
          echo "Running expo prebuild..."
          npx expo prebuild --platform android --clean --no-install
          echo "Prebuild complete. Listing directory:"
          ls -la
          echo "Checking android directory:"
          ls -la android/ || echo "No android directory found!"

      - name: Build Android APK
        run: |
          echo "Building Android APK..."
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          echo "Build complete. Listing outputs:"
          find . -name "*.apk" -type f
          ls -la app/build/outputs/apk/release/ || echo "No APK output directory!"

      - name: Copy APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk build.apk || echo "APK not found at expected path"
          ls -la build.apk || echo "build.apk not created"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: everwork-android
          path: EverworkApp/build.apk
          retention-days: 30
