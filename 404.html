<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found - Ever Work</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F0F13;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 72px; margin-bottom: 16px; color: #FF9A56; }
    h2 { font-size: 24px; margin-bottom: 24px; }
    p { color: rgba(255,255,255,0.6); margin-bottom: 32px; }
    a { 
      color: #FF9A56; 
      text-decoration: none; 
      padding: 16px 32px;
      border: 2px solid #FF9A56;
      border-radius: 12px;
      font-size: 18px;
      display: inline-block;
    }
    a:hover { background: rgba(255,154,86,0.1); }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you're looking for doesn't exist.</p>
  <a href="/pages/dashboard.html">Go to Dashboard</a>
</body>
</html>
